<!DOCTYPE html>
<html lang="en">
  <head>
    <script>

        n = f.fbq = function () {

      })(

    <noscript
      ><img
        height="1"
        width="1"
        style="display: none"
        src="https://www.facebook.com/tr?id=652962024478052&ev=PageView&noscript=1"

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book a Call | Patheown</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      /* ================= BASE ================= */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #fff;
        --surface: #f7f6ff;
        --border: #e2e0f5;
        --accent: #6c63ff;
        --accent-dk: #5550d4;
        --text: #0f0c2e;
        --muted: #5c5880;
        --green: #16a34a;
        --green-bg: #f0fdf4;
        --green-bdr: #bbf7d0;
      }
      body {
        font-family: "DM Sans", sans-serif;
        color: var(--text);
      }
      body,
      a,
      button,
      input {
        -webkit-tap-highlight-color: transparent;
      }
      /* ================= NAV ================= */
      /* NAV */
      nav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 200;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 56px;
        height: 70px;
        background: rgba(255, 255, 255, 0.96);
        backdrop-filter: blur(20px);
        border-bottom: 1px solid var(--border);
        box-shadow: 0 1px 16px rgba(108, 99, 255, 0.06);
      }
      .nav-logo {
        font-family: "Instrument Serif", serif;
        font-size: 26px;
        text-decoration: none;
      }
      .logo-plain {
        color: var(--text);
      }
      .logo-em {
        color: var(--accent);
        font-style: italic;
      }

      /* ================= HERO ================= */
      .book-hero {
        padding: 120px 56px 80px;
        background: linear-gradient(160deg, #fff 0%, #f7f5ff 55%, #ede9ff 100%);
      }
      .book-inner {
        max-width: 1200px;
        margin: auto;
        display: grid;
        grid-template-columns: 1fr 520px;
        gap: 60px;
        align-items: flex-start;
      }
      #book-inner-left {
        position: sticky;
        top: 85px;
      }
      @media (max-width: 1025px) {
        #book-inner-left {
          position: static;
        }
      }
      h1 {
        font-family: "Instrument Serif", serif;
        font-size: clamp(38px, 5vw, 54px);
        font-weight: 400;
        line-height: 1.1;
        margin-bottom: 18px;
      }

      h1 em {
        color: var(--accent);
        font-style: italic;
      }

      .hero-sub {
        font-size: 18px;
        color: var(--muted);
        line-height: 1.7;
        margin-bottom: 28px;
        max-width: 520px;
      }

      /* TRUST ROW */
      .hero-trust {
        display: flex;
        gap: 18px;
        flex-wrap: wrap;
      }
      .trust-pill {
        font-size: 15px;
        font-weight: 600;
        color: var(--muted);
      }

      /* RIGHT SIDE */
      .calendar-card {
        background: #fff;
        border: 1.5px solid var(--border);
        border-radius: 20px;
        padding: 20px;
        box-shadow: 0 20px 60px rgba(108, 99, 255, 0.12);
      }

      /* CALENDAR EMBED */
      .calendar-embed {
        width: 100%;
        height: 620px;
        border-radius: 14px;
        overflow: hidden;
        border: 1px solid var(--border);
      }

      /* HIPAA CARD */
      .hipaa-list li {
        font-size: 14px;
        font-weight: 600;
        color: var(--text);
      }

      .iframe-wrapper {
        position: relative;
        width: 100%;
        border-radius: 25px;
        height: 850px;
      }

      /* iframe hidden initially */
      .calendar-iframe {
        width: 100%;
        height: 100%;
        border: none;
        opacity: 0;
        transition: opacity 0.4s ease;
      }

      /* skeleton container */
      .iframe-skeleton {
        position: absolute;
        inset: 0;
        padding: 20px;
        background: #f6f7f8;
        display: flex;
        flex-direction: column;
        gap: 15px;
        animation: fadeIn 0.2s ease;
      }

      /* shimmer effect */
      .iframe-skeleton div {
        background: linear-gradient(
          90deg,
          #eeeeee 25%,
          #dddddd 37%,
          #eeeeee 63%
        );
        background-size: 400% 100%;
        animation: shimmer 1.4s infinite;
        border-radius: 8px;
      }

      .skeleton-header {
        height: 40px;
        width: 60%;
      }

      .skeleton-row {
        height: 20px;
        width: 100%;
      }

      .skeleton-row.short {
        width: 40%;
      }

      /* animations */
      @keyframes shimmer {
        0% {
          background-position: -400px 0;
        }
        100% {
          background-position: 400px 0;
        }
      }

      /* ================= MOBILE ================= */
      @media (max-width: 1024px) {
        nav {
          padding: 0 24px;
        }
        .book-inner {
          grid-template-columns: 1fr;
        }
        .book-hero {
          padding: 110px 14px 60px;
        }
      }
    </style>
  </head>

  <body>
    <!-- NAV -->
    <nav>
      <span class="nav-logo"
        ><span class="logo-plain">Path</span
        ><span class="logo-em">eown</span></span
      >
    </nav>
    <!-- HERO -->
    <section class="book-hero">
      <div class="book-inner">
        <!-- LEFT -->
        <div id="book-inner-left">
          <h1>
            Book your strategy call.<br />
            See exactly how much revenue<br />
            you're <em>losing right now.</em>
          </h1>

          <p class="hero-sub">
            Pick a time below. In 30 minutes, we’ll audit your workflows,
            identify hidden revenue leaks, and show exactly how AI fixes them.
          </p>

          <div class="hero-trust">
            <div class="trust-pill">✔ End-to-End Encrypted</div>
            <div class="trust-pill">✔ No Commitment</div>
            <div class="trust-pill">✔ No Credit Card</div>
          </div>
        </div>

        <!-- RIGHT -->
        <div>
          <div class="calendar-card">
            <div class="iframe-wrapper" id="iframeWrapper">
              <!-- Skeleton loader -->
              <div class="iframe-skeleton" id="iframeSkeleton">
                <div class="skeleton-header"></div>
                <div class="skeleton-row"></div>
                <div class="skeleton-row"></div>
                <div class="skeleton-row short"></div>
              </div>

              <iframe
                src="https://api.leadconnectorhq.com/widget/booking/ULqjVZlDozq9cGbrA5DF"
                style="width: 100%; border: none; overflow: hidden"
                scrolling="no"
                id="ULqjVZlDozq9cGbrA5DF_1776708875156"
                class="calendar-iframe"
              ></iframe>
            </div>
          </div>
        </div>
      </div>
    </section>
    <script
      src="https://link.msgsndr.com/js/form_embed.js"
      type="text/javascript"
    ></script>
    <script>
      const iframeWrapper = document.getElementById("iframeWrapper");
      const iframe = document.getElementById(
        "ULqjVZlDozq9cGbrA5DF_1776708875156"
      );
      const skeleton = document.getElementById("iframeSkeleton");
      iframe.addEventListener("load", (e) => {
        skeleton.style.opacity = "0";
        iframe.style.opacity = "1";
        setTimeout(() => {
          skeleton.style.display = "none";
          iframeWrapper.style.height = "100%";
        }, 400);
      });
    </script>
  </body>
</html>
